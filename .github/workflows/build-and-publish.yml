name: Build & Publish Fat Mod

on:
  push:
    branches: [main, master, develop]
    tags: ['*']
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  frontend:
    name: Build Frontend (Gulp)
    runs-on: ubuntu-latest
    container:
      image: opendigitaleducation/node:10-alpine
      options: --user root
    steps:
      - uses: actions/checkout@v4

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Build with Gulp
        run: node_modules/gulp/bin/gulp.js build

      - name: Upload frontend assets
        uses: actions/upload-artifact@v4
        with:
          name: frontend-assets
          path: src/main/resources/
          retention-days: 1

  backend:
    name: Build & Publish Fat Mod
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: temurin
          cache: maven

      - name: Download frontend assets
        uses: actions/download-artifact@v4
        with:
          name: frontend-assets
          path: src/main/resources/

      - name: Build fat JAR
        run: mvn clean package -DskipTests -B

      - name: Run tests
        if: github.event_name == 'pull_request'
        run: mvn test -B

      - name: Configure Maven for GitHub Packages
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                                        https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Publish fat JAR to GitHub Packages
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GROUP_ID=$(mvn help:evaluate -Dexpression=project.groupId -q -DforceStdout)
          ARTIFACT_ID=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          FAT_JAR="target/${ARTIFACT_ID}-${VERSION}-fat.jar"
          echo "Publishing ${GROUP_ID}:${ARTIFACT_ID}:${VERSION}:fat"
          if [ ! -f "${FAT_JAR}" ]; then
            echo "::error::Fat JAR not found at ${FAT_JAR}"
            ls -la target/*.jar 2>/dev/null || echo "No JARs found in target/"
            exit 1
          fi
          mvn deploy:deploy-file \
            -Dfile="${FAT_JAR}" \
            -DgroupId="${GROUP_ID}" \
            -DartifactId="${ARTIFACT_ID}" \
            -Dversion="${VERSION}" \
            -Dclassifier=fat \
            -Dpackaging=jar \
            -DrepositoryId=github \
            -Durl="https://maven.pkg.github.com/${{ github.repository }}" \
            -B

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: target/*-fat.jar
          generate_release_notes: true
